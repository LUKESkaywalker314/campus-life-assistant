<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二手集市 · 校园生活助手</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/modules.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="logo">校</span>
        <span>校园生活助手</span>
      </a>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">首页</a></li>
          <li><a href="schedule.html">我的课表</a></li>
          <li><a href="market.html">二手集市</a></li>
          <li><a href="lost.html">失物招领</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" type="button" aria-label="切换主题">☾</button>
        <button class="nav-toggle" type="button" aria-label="展开菜单">☰</button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <div class="container">
      <div class="section-head">
        <span class="section-title">二手集市</span>
      </div>

      <div class="split">
        <form class="panel" id="goodsForm" novalidate>
          <div class="panel-title">发布闲置</div>
          <div class="form-row">
            <label>商品名称<span class="req">*</span></label>
            <input class="input" name="title" maxlength="30" placeholder="如 数据结构教材" />
            <div class="field-error" data-err="title"></div>
          </div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <label>价格<span class="req">*</span></label>
              <input class="input" name="price" type="number" min="0" step="0.5" placeholder="元" />
              <div class="field-error" data-err="price"></div>
            </div>
            <div>
              <label>分类<span class="req">*</span></label>
              <select class="select" name="category">
                <option value="">请选择</option>
                <option>教材书籍</option>
                <option>数码电子</option>
                <option>生活用品</option>
                <option>运动户外</option>
                <option>其他</option>
              </select>
              <div class="field-error" data-err="category"></div>
            </div>
          </div>
          <div class="form-row">
            <label>成色<span class="req">*</span></label>
            <select class="select" name="condition">
              <option value="">请选择</option>
              <option>全新</option>
              <option>九成新</option>
              <option>八成新</option>
              <option>七成新及以下</option>
            </select>
            <div class="field-error" data-err="condition"></div>
          </div>
          <div class="form-row">
            <label>联系方式<span class="req">*</span></label>
            <input class="input" name="contact" maxlength="30" placeholder="微信 / QQ / 电话" />
            <div class="field-error" data-err="contact"></div>
          </div>
          <div class="form-row">
            <label>商品描述</label>
            <textarea class="textarea" name="desc" maxlength="200" placeholder="补充成色、使用情况、交易方式等"></textarea>
          </div>
          <div class="form-row">
            <label>商品图片</label>
            <div class="uploader" id="uploader">
              <label class="upload-trigger" for="imgInput">
                <span class="plus">+</span>
                <span>上传图片</span>
              </label>
              <input type="file" id="imgInput" accept="image/*" multiple hidden />
            </div>
          </div>
          <button class="btn btn-primary btn-block" type="submit">发布商品</button>
        </form>

        <div>
          <div class="filter-bar">
            <input class="input search" id="searchInput" placeholder="搜索商品名称" />
            <select class="select" id="statusFilter" style="width:auto">
              <option value="">全部状态</option>
              <option value="在售">在售</option>
              <option value="已售">已售</option>
            </select>
          </div>
          <div class="chips" id="categoryChips"></div>
          <p class="result-count" id="resultCount"></p>
          <div class="list-grid" id="goodsList"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      校园生活助手 · 25 计算机 1 班第 2 组实训项目 · <span data-year>2026</span>
    </div>
  </footer>

  <div class="lightbox" id="lightbox">
    <button class="close" type="button">×</button>
    <img alt="商品大图" />
  </div>

  <script src="js/dataManager.js"></script>
  <script src="js/common.js"></script>
  <script src="js/market.js"></script>
</body>
</html>
